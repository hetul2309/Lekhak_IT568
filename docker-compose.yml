services:
  backend:
    build:
      context: ./modern-blog-backend
      dockerfile: Dockerfile
    container_name: lekhak-backend
    env_file:
      - ./modern-blog-backend/.env
    ports:
      - "5001:5000"
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend/frontend
      dockerfile: Dockerfile
    container_name: lekhak-frontend
    depends_on:
      - backend
    ports:
      - "8080:80"
    restart: unless-stopped
